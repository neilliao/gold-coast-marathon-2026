<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="description" content="布里斯本、黃金海岸、馬拉松、飲食、街景與安靜片刻的照片分類。" />
  <meta name="color-scheme" content="light" />
  <link rel="stylesheet" href="assets/styles.css?v=20260701b" /></head>
<body>
  <a class="skip-link" href="#main">跳至主要內容</a>
  <noscript><span class="noscript-note">照片分類需要開啟 JavaScript 才會顯示。</span></noscript>

  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html">
        <span class="brand__mark">GC</span>
        <span class="brand__text"><strong>Gold Coast Marathon</strong><span>2026 · Neil 的跑步旅行</span></span>
      </a>
      <button class="nav-toggle" aria-controls="nav-links" aria-expanded="false">☰ 選單</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">首頁</a></li>
        <li><a href="itinerary.html">行程</a></li>
        <li><a href="intel.html">行前情報</a></li>
        <li><a href="race.html">馬拉松</a></li>
        <li><a href="journal.html">日誌</a></li>
        <li><a href="gallery.html">照片</a></li>
        <li><a href="checklist.html">清單</a></li>
        <li><a href="budget.html">財務</a></li>
      </ul>
    </div>
  </header>

  <main id="main">
    <div class="page-head">
      <div class="wrap page-head__inner">
        <span class="eyebrow">📸 照片牆</span>
        <h1>分類佔位，旅行後再放照片</h1>
        <p>把照片放進 <code>assets/photos/</code>，再到 <code>data.js</code> 的 <code>gallery</code> 把檔名補上即可。</p>
      </div>
    </div>
    <section class="section wrap">
      <details id="pat-setup" style="margin-bottom:1rem;background:#f5f0e8;border:1px solid #d4c9b0;border-radius:8px;padding:.6rem 1rem;">
        <summary style="cursor:pointer;font-size:.85rem;color:#6b5e44;user-select:none;">🔑 設定 PAT（無 PAT 時照片可能顯示不出來）</summary>
        <div style="margin-top:.6rem;display:flex;gap:.5rem;align-items:center;">
          <input type="password" id="gallery-pat" placeholder="github_pat_..." autocomplete="off"
            style="flex:1;padding:.4rem .6rem;border:1px solid #ccc;border-radius:6px;font-size:.85rem;" />
          <button onclick="(function(){var v=document.getElementById('gallery-pat').value.trim();if(v){localStorage.setItem('gc_pat',v);document.getElementById('pat-setup').removeAttribute('open');location.reload();}})();"
            style="padding:.4rem .8rem;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;">儲存並重整</button>
          <button onclick="localStorage.removeItem('gc_pat');location.reload();"
            style="padding:.4rem .6rem;background:#e5e7eb;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;">清除</button>
        </div>
      </details>
      <div data-render="gallery"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap site-footer__inner">
      <div><strong style="color:#fff">Gold Coast Marathon 2026</strong><br><small>Neil 的黃金海岸馬拉松旅行紀錄</small></div>
      <small>© <span data-year>2026</span></small>
    </div>
  </footer>

  <script src="assets/data.js?v=20260701b"></script>
  <script src="assets/app.js?v=20260701b" defer></script></body>
</html>

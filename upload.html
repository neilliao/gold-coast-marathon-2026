<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>上傳照片 · Gold Coast 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100dvh; padding: 1.5rem 1rem 3rem; }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; color: #fff; letter-spacing: .02em; }
    h2 { font-size: 1rem; font-weight: 600; color: #ccc; margin: 2rem 0 .75rem; border-top: 1px solid #222; padding-top: 1.5rem; }
    label { display: block; font-size: .8rem; color: #999; margin-bottom: .35rem; }
    input[type=text], input[type=password], select {
      width: 100%; background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
      color: #eee; font-size: .95rem; padding: .6rem .75rem; margin-bottom: 1rem;
    }
    input[type=file] { display: none; }
    .pick-btn {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      width: 100%; background: #1e1e1e; border: 1.5px dashed #444; border-radius: 10px;
      color: #aaa; font-size: .95rem; padding: 1.2rem; cursor: pointer;
      margin-bottom: 1rem; transition: border-color .15s;
    }
    .pick-btn:hover { border-color: #888; color: #eee; }
    .previews { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
    .preview-item { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .rm { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.7);
      border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px;
      font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .upload-btn {
      width: 100%; background: #2563eb; border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; font-weight: 600; padding: .85rem;
      cursor: pointer; transition: background .15s; margin-bottom: 1rem;
    }
    .upload-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .upload-btn:not(:disabled):hover { background: #1d4ed8; }
    #log { font-size: .8rem; line-height: 1.7; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .info { color: #94a3b8; }
    .pat-row { display: flex; gap: .5rem; align-items: flex-end; margin-bottom: 0; }
    .pat-row input { margin-bottom: 0; flex: 1; }
    .clear-btn { background: #2a2a2a; border: 1px solid #333; border-radius: 8px;
      color: #999; font-size: .75rem; padding: .6rem .75rem; cursor: pointer; white-space: nowrap; margin-bottom: 1rem; }
    .clear-btn:hover { color: #eee; }
    .warn { background: #422006; border: 1px solid #78350f; border-radius: 8px;
      color: #fbbf24; font-size: .8rem; padding: .6rem .75rem; margin-bottom: 1rem; line-height: 1.5; }
    /* 管理區 */
    #manage-cat { width: 100%; background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
      color: #eee; font-size: .9rem; padding: .5rem .75rem; margin-bottom: .75rem; }
    .load-btn { background: #1e1e1e; border: 1px solid #444; border-radius: 8px;
      color: #aaa; font-size: .85rem; padding: .5rem 1rem; cursor: pointer; margin-bottom: 1rem; }
    .load-btn:hover { color: #eee; border-color: #888; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; }
    .photo-card { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #1e1e1e; }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; }
    .del-btn { position: absolute; bottom: 4px; right: 4px;
      background: rgba(220,38,38,.9); border: none; border-radius: 6px;
      color: #fff; font-size: .7rem; padding: 3px 7px; cursor: pointer; }
    .del-btn:disabled { background: #555; cursor: not-allowed; }
    #manage-log { font-size: .8rem; line-height: 1.7; margin-top: .5rem; }
  </style>
</head>
<body>
  <h1>上傳照片</h1>

  <div class="warn">⚠️ iPhone 相機設定 → 格式 → <strong>最相容（JPEG）</strong>，否則 HEIC 傳上去顯示壞。</div>

  <label>GitHub PAT（存在本機，不會傳給任何人）</label>
  <div class="pat-row">
    <input type="password" id="pat" placeholder="github_pat_..." autocomplete="off" />
    <button class="clear-btn" id="clear-pat">清除</button>
  </div>

  <label>相簿分類</label>
  <select id="cat">
    <option value="feed">旅程隨拍（預設）</option>
    <option value="marathon">馬拉松</option>
    <option value="gold-coast">黃金海岸</option>
    <option value="brisbane">布里斯本</option>
    <option value="food">飲食</option>
    <option value="street">街景</option>
    <option value="quiet">安靜片刻</option>
  </select>

  <label for="file-pick">選擇照片（可多張）</label>
  <label class="pick-btn" for="file-pick">
    <span>＋ 選照片</span>
    <input type="file" id="file-pick" accept="image/*" multiple />
  </label>

  <div class="previews" id="previews"></div>

  <button class="upload-btn" id="upload-btn" disabled>上傳</button>

  <div id="log"></div>

  <!-- 管理區 -->
  <h2>管理已上傳照片</h2>
  <select id="manage-cat">
    <option value="feed">旅程隨拍</option>
    <option value="marathon">馬拉松</option>
    <option value="gold-coast">黃金海岸</option>
    <option value="brisbane">布里斯本</option>
    <option value="food">飲食</option>
    <option value="street">街景</option>
    <option value="quiet">安靜片刻</option>
  </select>
  <button class="load-btn" id="load-btn">載入照片</button>
  <div class="photo-grid" id="photo-grid"></div>
  <div id="manage-log"></div>

  <script>
  const OWNER  = 'neilliao';
  const REPO   = 'gold-coast-marathon-2026';
  const BRANCH = 'main';
  const RAW    = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/`;
  const API    = `https://api.github.com/repos/${OWNER}/${REPO}/contents/`;

  const patEl   = document.getElementById('pat');
  const catEl   = document.getElementById('cat');
  const pickEl  = document.getElementById('file-pick');
  const previews = document.getElementById('previews');
  const btn     = document.getElementById('upload-btn');
  const log     = document.getElementById('log');

  patEl.value = localStorage.getItem('gc_pat') || '';
  patEl.addEventListener('input', () => localStorage.setItem('gc_pat', patEl.value.trim()));
  document.getElementById('clear-pat').addEventListener('click', () => {
    patEl.value = ''; localStorage.removeItem('gc_pat'); updateBtn();
  });

  let files = [];

  pickEl.addEventListener('change', () => {
    Array.from(pickEl.files).forEach(addFile);
    pickEl.value = '';
    updateBtn();
  });

  function addFile(f) {
    const idx = files.length;
    files.push(f);
    const wrap = document.createElement('div');
    wrap.className = 'preview-item';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    const rm = document.createElement('button');
    rm.className = 'rm'; rm.textContent = '×';
    rm.onclick = () => { files[idx] = null; wrap.remove(); updateBtn(); };
    wrap.appendChild(img); wrap.appendChild(rm);
    previews.appendChild(wrap);
  }

  function updateBtn() {
    btn.disabled = !(files.some(f => f !== null) && patEl.value.trim().length > 10);
  }
  patEl.addEventListener('input', updateBtn);

  function addLog(msg, cls, el) {
    const p = document.createElement('p');
    p.className = cls; p.textContent = msg;
    (el || log).prepend(p);
  }

  async function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  function ghHeaders() {
    const pat = patEl.value.trim();
    const h = { Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' };
    if (pat) h.Authorization = 'Bearer ' + pat;
    return h;
  }

  // ── 上傳 ──────────────────────────────────────────────
  btn.addEventListener('click', async () => {
    btn.disabled = true; btn.textContent = '上傳中…'; log.innerHTML = '';
    const cat = catEl.value;
    for (const file of files.filter(Boolean)) {
      const rand = Math.random().toString(36).slice(2, 8);
      const ext  = file.name.split('.').pop().toLowerCase() || 'jpg';
      const path = `assets/photos/${cat}/${rand}.${ext}`;
      addLog(`⬆ ${file.name} → ${path}`, 'info');
      try {
        const content = await toBase64(file);
        const res = await fetch(API + path, {
          method: 'PUT', headers: ghHeaders(),
          body: JSON.stringify({ message: `photo: add ${cat}/${rand}.${ext}`, content, branch: BRANCH }),
        });
        if (res.ok) addLog(`✓ ${file.name} 上傳成功`, 'ok');
        else { const j = await res.json().catch(() => ({})); addLog(`✗ 失敗 ${res.status}：${j.message || ''}`, 'err'); }
      } catch (e) { addLog(`✗ 錯誤：${e.message}`, 'err'); }
    }
    btn.textContent = '上傳'; updateBtn();
  });

  // ── 管理 ──────────────────────────────────────────────
  const grid      = document.getElementById('photo-grid');
  const mlog      = document.getElementById('manage-log');
  const manageCat = document.getElementById('manage-cat');

  document.getElementById('load-btn').addEventListener('click', loadPhotos);

  async function loadPhotos() {
    grid.innerHTML = '<p style="color:#666;font-size:.85rem">載入中…</p>';
    mlog.innerHTML = '';
    const cat = manageCat.value;
    try {
      const res = await fetch(API + `assets/photos/${cat}?ref=${BRANCH}`, { headers: ghHeaders() });
      if (!res.ok) throw new Error(res.status);
      const files = await res.json();
      const imgs = Array.isArray(files) ? files.filter(f => f.type === 'file' && /\.(jpe?g|png|webp|gif|avif)$/i.test(f.name)) : [];
      grid.innerHTML = '';
      if (!imgs.length) { grid.innerHTML = '<p style="color:#666;font-size:.85rem">這個分類還沒有照片</p>'; return; }
      imgs.forEach(f => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        const img = document.createElement('img');
        img.src = RAW + f.path;
        img.loading = 'lazy';
        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn'; delBtn.textContent = '刪除';
        delBtn.onclick = () => deletePhoto(f, delBtn, card);
        card.appendChild(img); card.appendChild(delBtn);
        grid.appendChild(card);
      });
    } catch (e) { grid.innerHTML = ''; addLog(`載入失敗：${e.message}`, 'err', mlog); }
  }

  async function deletePhoto(f, delBtn, card) {
    if (!confirm(`確定刪除 ${f.name}？`)) return;
    delBtn.disabled = true; delBtn.textContent = '…';
    try {
      const res = await fetch(API + f.path, {
        method: 'DELETE', headers: ghHeaders(),
        body: JSON.stringify({ message: `photo: delete ${f.path}`, sha: f.sha, branch: BRANCH }),
      });
      if (res.ok) { card.remove(); addLog(`✓ ${f.name} 已刪除`, 'ok', mlog); }
      else { const j = await res.json().catch(() => ({})); addLog(`✗ 刪除失敗 ${res.status}：${j.message || ''}`, 'err', mlog); delBtn.disabled = false; delBtn.textContent = '刪除'; }
    } catch (e) { addLog(`✗ 錯誤：${e.message}`, 'err', mlog); delBtn.disabled = false; delBtn.textContent = '刪除'; }
  }
  </script>
</body>
</html>
